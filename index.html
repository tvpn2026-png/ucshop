<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG UC Price List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pubg-gold: #f39c12;
            --pubg-orange: #d35400;
            --bg-dark: #0a0c10;
            --card-bg: rgba(255, 255, 255, 0.04);
            --uc-blue: #00d2ff;
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 30px 15px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Logo Animation */
        .logo-container {
            position: relative;
            margin-bottom: 20px;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--pubg-gold);
            box-shadow: 0 0 25px rgba(243, 156, 18, 0.4);
            transition: transform 0.5s ease;
        }

        .logo-img:hover {
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            color: var(--pubg-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(243, 156, 18, 0.4);
            border-bottom: 2px solid rgba(243, 156, 18, 0.2);
            padding-bottom: 10px;
            width: 100%;
            max-width: 400px;
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        /* Pro Card Style */
        .price-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .price-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--pubg-gold), var(--pubg-orange));
        }

        .price-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--pubg-gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .uc-amount {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            display: block;
        }

        .price-amount {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--uc-blue);
            background: rgba(0, 210, 255, 0.1);
            padding: 5px 15px;
            border-radius: 10px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        /* Buy Button Section */
        .action-area {
            margin-top: 40px;
            text-align: center;
            width: 100%;
        }

        .buy-btn {
            display: inline-block;
            padding: 15px 50px;
            background: linear-gradient(135deg, var(--pubg-gold) 0%, var(--pubg-orange) 100%);
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 25px rgba(243, 156, 18, 0.5);
            filter: brightness(1.1);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aaa;
            font-weight: 400;
        }

        /* Responsive Fix */
        @media (max-width: 400px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            h1 { font-size: 1.2rem; }
            .uc-amount { font-size: 0.95rem; }
            .price-amount { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/tvpn2026-png/ucshop/refs/heads/main/20260414_155459.png" alt="Logo" class="logo-img">
    </div>
    
    <h1>PUBG UC စျေးနှုန်းများ</h1>

    <div class="grid-container">
        <div class="price-card">
            <span class="uc-amount">💵 60 UC</span>
            <span class="price-amount">36 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 325 UC</span>
            <span class="price-amount">170 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 660 UC</span>
            <span class="price-amount">340 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 1800 UC</span>
            <span class="price-amount">840 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 3850 UC</span>
            <span class="price-amount">1650 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 8100 UC</span>
            <span class="price-amount">3300 B</span>
        </div>
    </div>

    <div class="action-area">
        <p class="footer-text">UC များကို စျေးသက်သာစွာ ဝယ်ယူနိုင်ပါပြီ</p>
        <a href="https://m.me/TunnTunnWinnn" target="_blank" class="buy-btn">🛒 UC ဝယ်ယူရန်</a>
    </div>

</body>
</html>
