<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG UC Price List</title>
    <style>
        /* Background Design */
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        /* Container for 3D effect */
        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            color: #f39c12;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 2px 4px 10px rgba(243, 156, 18, 0.3);
        }

        /* 3D Card Style for Price Items */
        .price-card {
            background: linear-gradient(145deg, #232946, #121629);
            margin: 15px 0;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border-bottom: 4px solid #f39c12; /* Accent line */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }

        /* Hover effect to give 3D feel */
        .price-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 25px rgba(243, 156, 18, 0.2);
            background: linear-gradient(145deg, #2d345a, #1a1f3d);
        }

        .uc-amount {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
        }

        .price-amount {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00d2ff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PUBG UC စျေးနှုန်း</h1>

        <div class="price-card">
            <span class="uc-amount">💵 60 UC</span>
            <span class="price-amount">36 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 325 UC</span>
            <span class="price-amount">170 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 660 UC</span>
            <span class="price-amount">340 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 1800 UC</span>
            <span class="price-amount">840 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 3850 UC</span>
            <span class="price-amount">1650 B</span>
        </div>

        <div class="price-card">
            <span class="uc-amount">💵 8100 UC</span>
            <span class="price-amount">3300 B</span>
        </div>

        <p class="footer-text"> Uc များကို စျေးသက်သာစွာ ဝယ်ယူနိင်ပါပြီး </p>
    </div>

</body>
</html>
